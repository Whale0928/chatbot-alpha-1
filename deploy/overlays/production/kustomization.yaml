apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatbot-alpha-1

resources:
  - resources.yaml
  - deployment.yaml

generators:
  - ksops-generator.yaml

# newTag는 .github/workflows/release.yml 이 main 푸시마다 main-{sha7} 형식으로 자동 갱신한다.
# Image Updater 의존성 제거 — GitHub Actions 가 직접 kustomize edit set image 로 commit/push.
images:
  - name: docker-registry.bottle-note.com/chatbot-alpha-1
    newTag: v0.0.1
