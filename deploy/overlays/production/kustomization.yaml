apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatbot-alpha-1

resources:
- resources.yaml
- deployment.yaml

generators:
- ksops-generator.yaml

# 실제 배포 이미지 tag 는 ArgoCD Image Updater(default-updater)가 application spec 에 직접 patch 한다
# (writeBackConfig.method: argocd). 따라서 아래 newTag 는 fallback baseline 이며,
# main 푸시 → release.yml 이 v*.*.* 태그를 새로 만들면 Image Updater 가 그 값으로 app spec 갱신.
images:
- name: docker-registry.bottle-note.com/chatbot-alpha-1
  newName: docker-registry.bottle-note.com/chatbot-alpha-1
  newTag: v0.0.1
