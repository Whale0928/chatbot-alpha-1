name: release

# main 푸시 시: 다음 patch semver(v*.*.*) 자동 결정 → 이미지 빌드 + Zot push + git tag push.
# ArgoCD Image Updater(default-updater)가 새 semver 태그 감지 → application spec 의 newTag 자동 갱신
# → ArgoCD selfHeal 로 Pod 재시작.
#
# workflow_dispatch 로 수동 실행 시 bump 종류(major/minor/patch) 선택 가능.
#
# Zot 은 OCI media type 만 받고 docker schema 2 manifest 를 415 로 거부한다.
# 따라서 buildx + oci-mediatypes=true 로 OCI 형식 push 강제.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'deploy/**'
      - 'testdata/**'
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: '버전 bump 종류'
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  # 빌드 진행 중인 워크플로우를 중도 취소하면 git tag/이미지 push 가 어긋날 수 있어 false.
  group: release-build
  cancel-in-progress: false

env:
  REGISTRY: docker-registry.bottle-note.com
  IMAGE_NAME: chatbot-alpha-1

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # git tag push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 태그/히스토리 (semver 계산에 필요)

      - name: Determine next version
        id: ver
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1 || true)
          if [ -z "${LATEST}" ]; then
            MAJ=0; MIN=0; PAT=0
          else
            STRIPPED="${LATEST#v}"
            IFS='.' read -r MAJ MIN PAT <<< "$STRIPPED"
          fi
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
            *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          NEW="v${MAJ}.${MIN}.${PAT}"
          echo "value=$NEW" >> "$GITHUB_OUTPUT"
          echo "previous=${LATEST:-(없음)}" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Previous: ${LATEST:-(없음)} / Bump: $BUMP / New: $NEW"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build & push (OCI mediatype)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          # Zot 호환을 위해 OCI media type 강제 + 단일 manifest push
          outputs: type=image,oci-mediatypes=true,push=true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.value }}

      - name: Push git tag
        env:
          TAG: ${{ steps.ver.outputs.value }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG 이미 존재 — push skip"
            exit 0
          fi
          git tag -a "$TAG" -m "auto release $TAG (commit $TRIGGER_SHA)"
          git push origin "$TAG"
          echo "git tag $TAG push 완료"

      - name: Summary
        env:
          TAG: ${{ steps.ver.outputs.value }}
          PREV: ${{ steps.ver.outputs.previous }}
          BUMP: ${{ steps.ver.outputs.bump }}
        run: |
          {
            echo "## Released"
            echo "- 이전 tag: \`${PREV}\`"
            echo "- Bump: \`${BUMP}\`"
            echo "- 이미지: \`${REGISTRY}/${IMAGE_NAME}:${TAG}\`"
            echo "- git tag: \`${TAG}\`"
            echo "- 후속: ArgoCD Image Updater 가 새 semver 감지 → app spec 자동 갱신 → Pod 재시작"
          } >> "$GITHUB_STEP_SUMMARY"
