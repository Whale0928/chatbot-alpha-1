name: release

# git tag vX.Y.Z push 시 amd64 이미지 빌드 → Zot push.
# ArgoCD Image Updater(default-updater)가 새 semver 태그 감지 후 자동으로
# Application의 newTag를 갱신하므로 별도 sync trigger 불필요.
#
# Zot은 OCI image index가 아닌 단일 image manifest만 받으므로 buildx 대신
# docker build/push를 직접 호출. ubuntu-latest는 amd64 native라 cross-build 불요.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (vX.Y.Z)'
        required: true

env:
  REGISTRY: docker-registry.bottle-note.com
  IMAGE: docker-registry.bottle-note.com/chatbot-alpha-1

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Zot
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.tag.outputs.value }}" \
            -t "${IMAGE}:${{ steps.tag.outputs.value }}" \
            .

      - name: Push
        run: docker push "${IMAGE}:${{ steps.tag.outputs.value }}"

      - name: Summary
        run: |
          echo "## Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${IMAGE}:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
